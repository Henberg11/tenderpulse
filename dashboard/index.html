<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TenderPulse</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TenderPulse">
<meta name="theme-color" content="#0E1116">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0E1116;
    --paper: #171B23;
    --paper-raised: #1D2330;
    --line: #262B36;
    --line-strong: #333A4A;
    --text: #E7E9ED;
    --text-dim: #8B92A3;
    --text-faint: #5B6274;
    --saffron: #E8A33D;
    --saffron-dim: rgba(232, 163, 61, 0.14);
    --verdant: #4FA876;
    --verdant-dim: rgba(79, 168, 118, 0.14);
    --alarm: #E15A4C;
    --alarm-dim: rgba(225, 90, 76, 0.14);
    --sans: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ink: #F6F5F1;
      --paper: #FFFFFF;
      --paper-raised: #FFFFFF;
      --line: #E4E2DB;
      --line-strong: #CFCCC2;
      --text: #1A1B1E;
      --text-dim: #63656E;
      --text-faint: #96979E;
      --saffron: #B87A1F;
      --saffron-dim: rgba(184, 122, 31, 0.10);
      --verdant: #1E7A50;
      --verdant-dim: rgba(30, 122, 80, 0.10);
      --alarm: #C23A2C;
      --alarm-dim: rgba(194, 58, 44, 0.10);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--ink);
    color: var(--text);
    padding-bottom: 48px;
    padding-top: env(safe-area-inset-top);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    background: var(--ink);
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line);
    z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 16px; }
  .brand .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--verdant);
    box-shadow: 0 0 0 3px var(--verdant-dim);
    flex-shrink: 0;
  }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .brand-tag { font-size: 11px; color: var(--text-faint); font-family: var(--mono); margin-left: auto; }

  /* ---------- Stats strip ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .stat {
    padding: 11px 6px;
    text-align: center;
    border-right: 1px solid var(--line);
    background: var(--paper);
  }
  .stat:last-child { border-right: none; }
  .stat .num { font-family: var(--mono); font-size: 19px; font-weight: 600; line-height: 1.1; color: var(--text); }
  .stat.urgent .num { color: var(--alarm); }
  .stat .label { font-size: 10px; color: var(--text-faint); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ---------- Controls ---------- */
  .controls-row { display: flex; gap: 8px; margin-bottom: 8px; position: relative; }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 9px;
    font-size: 16px;
    font-family: var(--sans);
  }
  input[type="text"]:focus { outline: none; border-color: var(--line-strong); }
  input[type="text"]::placeholder { color: var(--text-faint); }

  .region-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 0 14px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    cursor: pointer;
  }
  .region-btn svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
  .region-count {
    background: var(--saffron-dim);
    color: var(--saffron);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .region-popover {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    width: 240px;
    max-height: 320px;
    overflow-y: auto;
    background: var(--paper-raised);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    z-index: 30;
    padding: 6px;
  }
  .region-popover.open { display: block; }
  .region-option {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .region-option:hover { background: var(--line); }
  .region-option input { accent-color: var(--saffron); width: 15px; height: 15px; flex-shrink: 0; }
  .region-footer {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px 2px;
    margin-top: 4px;
    border-top: 1px solid var(--line);
  }
  .region-footer button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    padding: 4px 6px;
  }
  .region-footer button.primary { color: var(--saffron); font-weight: 600; }

  .chips-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .chip {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chip.active { background: var(--text); color: var(--ink); border-color: var(--text); }

  main { padding: 14px 14px 0; max-width: 720px; margin: 0 auto; }
  .status-line {
    color: var(--text-faint);
    font-size: 11.5px;
    font-family: var(--mono);
    margin: 14px 0 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: var(--sans);
    cursor: pointer;
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 2px solid var(--line-strong);
    border-radius: 10px;
    padding: 15px 16px;
    margin-bottom: 10px;
  }
  .card.card-urgent { border-left-color: var(--alarm); }
  .card.card-soon { border-left-color: var(--saffron); }
  .card-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; }
  .title { font-size: 14.5px; font-weight: 600; line-height: 1.4; flex: 1; letter-spacing: -0.005em; }
  .title-link { text-decoration: none; color: inherit; display: block; }
  .org-name { font-size: 12.5px; font-weight: 500; color: var(--saffron); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .org-name svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.85; }

  .deadline-badge {
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 6px;
    background: var(--line);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .deadline-badge.urgent { background: var(--alarm-dim); color: var(--alarm); }
  .deadline-badge.soon { background: var(--saffron-dim); color: var(--saffron); }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .badge {
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--line);
    color: var(--text-dim);
  }
  .badge.precise { background: var(--verdant-dim); color: var(--verdant); }
  .badge.corrigendum { background: var(--saffron-dim); color: var(--saffron); }
  .badge.portal { background: rgba(139, 146, 163, 0.14); color: var(--text-dim); font-family: var(--mono); font-weight: 600; }

  .meta { font-size: 12px; color: var(--text-dim); margin-top: 11px; line-height: 1.85; }
  .meta-row { display: flex; align-items: center; gap: 6px; }
  .meta-row svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.6; }
  .meta .tender-id { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.01em; }

  .ai-summary {
    margin-top: 12px;
    padding: 11px 13px;
    background: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 13px; flex-wrap: wrap; }
  .view-btn {
    background: var(--saffron);
    color: var(--ink);
    text-decoration: none;
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 7px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .toggle-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .toggle-btn.active-track { background: var(--saffron-dim); border-color: var(--saffron); color: var(--saffron); }
  .toggle-btn.active-applied { background: var(--verdant-dim); border-color: var(--verdant); color: var(--verdant); }
  .expand-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--sans);
    padding: 8px 2px;
    cursor: pointer;
    margin-left: auto;
  }

  .details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 12.5px; color: var(--text-dim); line-height: 1.6; }
  .details.open { display: block; }
  .details h4 { margin: 10px 0 4px; color: var(--text); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .details h4:first-child { margin-top: 0; }

  .empty, .loading, .error {
    text-align: center;
    color: var(--text-faint);
    padding: 64px 20px;
    font-size: 13.5px;
  }
  .error { color: var(--alarm); }
  .empty svg { width: 32px; height: 32px; margin-bottom: 10px; opacity: 0.4; }

  /* ---------- Detail page ---------- */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
  }
  .detail-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .modal-title { font-size: 18px; font-weight: 700; line-height: 1.4; letter-spacing: -0.01em; }
  .modal-org { font-size: 13px; font-weight: 500; color: var(--saffron); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .modal-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
    padding: 14px;
    background: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .modal-meta-item .label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.04em; }
  .modal-meta-item .value { font-size: 13px; font-weight: 600; margin-top: 3px; }
  .modal-meta-item .value.mono { font-family: var(--mono); font-size: 12px; }

  .ai-section { margin-top: 18px; }
  .ai-section h3 {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--saffron); margin: 0 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .ai-section .body { font-size: 13.5px; color: var(--text); line-height: 1.65; background: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; margin-bottom: 14px; }

  .analyze-box {
    margin-top: 18px;
    padding: 18px;
    border: 1px dashed var(--line-strong);
    border-radius: 12px;
    text-align: center;
  }
  .analyze-box p { font-size: 12.5px; color: var(--text-dim); margin: 0 0 12px; line-height: 1.6; }
  .analyze-btn {
    background: var(--saffron);
    color: var(--ink);
    border: none;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .analyze-btn:disabled { opacity: 0.6; cursor: default; }
  .analyze-error { color: var(--alarm); font-size: 12px; margin-top: 10px; }

  .modal-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
</style>
</head>
<body>

<header id="listHeader">
  <div class="brand">
    <span class="pulse-dot"></span>
    <span class="brand-name">TenderPulse</span>
    <span class="brand-tag" id="clockTag"></span>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="controls-row">
    <input type="text" id="search" placeholder="Search titles&hellip;">
    <button class="region-btn" id="regionBtn" onclick="toggleRegionPopover()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.2-7-11.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
      <span id="regionLabel">Region</span>
    </button>
    <div class="region-popover" id="regionPopover"></div>
  </div>
  <div class="chips-row">
    <span class="chip active" data-filter="all">All</span>
    <span class="chip" data-filter="precise">My products</span>
    <span class="chip" data-filter="urgent">Closing soon</span>
    <span class="chip" data-filter="corrigendum">Changed</span>
    <span class="chip" data-filter="tracked">Tracking</span>
    <span class="chip" data-filter="applied">Applied</span>
  </div>
</header>

<header id="detailHeader" style="display:none;">
  <div class="brand">
    <span class="pulse-dot"></span>
    <span class="brand-name">TenderPulse</span>
  </div>
  <a href="./" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Back to all tenders</a>
</header>

<main>
  <div class="status-line" id="listStatusLine">
    <span id="statusText">Loading&hellip;</span>
    <button class="refresh-btn" onclick="loadTenders()">Refresh</button>
  </div>
  <div id="results"></div>
</main>


<script src="config.js"></script>
<script>
let allTenders = [];
let activeFilter = "all";

const ICONS = {
  building: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v16"/><path d="M15 21V9a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v12"/><path d="M9 9h.01M9 12h.01M9 15h.01M6 9h.01M6 12h.01M6 15h.01"/></svg>',
  pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.2-7-11.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg>',
  coin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 8v8"/></svg>',
  arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  empty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M3 7l3-4h12l3 4M9 12h6"/></svg>',
  spark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>',
};

function updateClock() {
  document.getElementById("clockTag").textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
updateClock();
setInterval(updateClock, 30000);

async function loadTenders() {
  const resultsEl = document.getElementById("results");
  const statusEl = document.getElementById("statusText");

  if (SUPABASE_CONFIG.url.includes("YOUR_PROJECT_REF")) {
    resultsEl.innerHTML = `<div class="error">config.js hasn't been filled in yet -- add your Supabase URL and anon key.</div>`;
    statusEl.textContent = "";
    return;
  }

  statusEl.textContent = "Refreshing\u2026";

  try {
    const res = await fetch(
      `${SUPABASE_CONFIG.url}/rest/v1/tenders?select=*,organisations(name)&or=${encodeURIComponent(`(bid_submission_end.is.null,bid_submission_end.gte.${new Date().toISOString()},is_applied.eq.true)`)}&order=bid_submission_end.asc.nullslast&limit=200`,
      {
        headers: {
          apikey: SUPABASE_CONFIG.anonKey,
          Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}`,
        },
      }
    );
    if (!res.ok) throw new Error(`Supabase returned ${res.status}: ${await res.text()}`);
    allTenders = await res.json();
    statusEl.textContent = `${allTenders.length} tenders \u00b7 updated ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
    populateRegionPopover();
    render();
  } catch (err) {
    if (allTenders.length === 0) {
      resultsEl.innerHTML = `<div class="error">Couldn't load tenders: ${err.message}</div>`;
    }
    statusEl.textContent = "Refresh failed -- showing last loaded data";
  }
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getStateFilteredTenders() {
  const selectedStates = [...document.querySelectorAll(".region-option input:checked")].map((el) => el.value);
  if (selectedStates.length === 0) return allTenders;
  return allTenders.filter((t) => !t.location || selectedStates.includes(t.location));
}

function renderStats() {
  const statsBar = document.getElementById("statsBar");
  const stateFiltered = getStateFilteredTenders();
  const closingSoon = stateFiltered.filter((t) => {
    const d = daysUntil(t.bid_submission_end);
    return d !== null && d >= 0 && d <= 7;
  }).length;
  const coreMatches = stateFiltered.filter((t) => t.matched_keywords && t.matched_keywords.length > 0).length;
  const changed = stateFiltered.filter((t) => t.status === "corrigendum_issued").length;

  statsBar.innerHTML = `
    <div class="stat ${closingSoon > 0 ? "urgent" : ""}">
      <div class="num">${closingSoon}</div>
      <div class="label">Closing \u22647d</div>
    </div>
    <div class="stat">
      <div class="num">${coreMatches}</div>
      <div class="label">My Products</div>
    </div>
    <div class="stat">
      <div class="num">${changed}</div>
      <div class="label">Changed</div>
    </div>
    <div class="stat">
      <div class="num">${stateFiltered.length}</div>
      <div class="label">Tracked</div>
    </div>
  `;
}

const DEFAULT_STATES = ["Gujarat", "Dadra and Nagar Haveli and Daman and Diu"];
let regionInitialized = false;

function populateRegionPopover() {
  const popover = document.getElementById("regionPopover");
  const previouslyChecked = new Set([...document.querySelectorAll(".region-option input:checked")].map((el) => el.value));
  const dataStates = allTenders.map((t) => t.location).filter(Boolean);
  const allStates = [...new Set([...DEFAULT_STATES, ...dataStates])].sort();
  const toCheck = regionInitialized ? previouslyChecked : new Set(DEFAULT_STATES);

  popover.innerHTML =
    allStates.map((s) => `
      <label class="region-option">
        <input type="checkbox" value="${escapeHtml(s)}" ${toCheck.has(s) ? "checked" : ""} onchange="render()">
        <span>${escapeHtml(s)}</span>
      </label>`).join("") +
    `<div class="region-footer">
       <button onclick="clearRegion()">Show all states</button>
       <button class="primary" onclick="closeRegionPopover()">Done</button>
     </div>`;

  regionInitialized = true;
  updateRegionLabel();
}

function updateRegionLabel() {
  const count = document.querySelectorAll(".region-option input:checked").length;
  const label = document.getElementById("regionLabel");
  const total = document.querySelectorAll(".region-option input").length;
  if (count === 0 || count === total) {
    label.innerHTML = "All states";
  } else if (count <= 2) {
    const names = [...document.querySelectorAll(".region-option input:checked")].map((el) => el.value.split(" ")[0]);
    label.innerHTML = names.join(", ");
  } else {
    label.innerHTML = `Region <span class="region-count">${count}</span>`;
  }
}

function toggleRegionPopover() {
  document.getElementById("regionPopover").classList.toggle("open");
}
function closeRegionPopover() {
  document.getElementById("regionPopover").classList.remove("open");
}
function clearRegion() {
  document.querySelectorAll(".region-option input").forEach((el) => (el.checked = false));
  render();
}
document.addEventListener("click", (e) => {
  const popover = document.getElementById("regionPopover");
  const btn = document.getElementById("regionBtn");
  if (popover && !popover.contains(e.target) && !btn.contains(e.target)) {
    popover.classList.remove("open");
  }
});

function render() {
  renderStats();
  updateRegionLabel();
  const resultsEl = document.getElementById("results");
  const query = document.getElementById("search").value.toLowerCase();

  let filtered = getStateFilteredTenders().filter((t) => t.title.toLowerCase().includes(query));

  if (activeFilter === "precise") {
    filtered = filtered.filter((t) => t.matched_keywords && t.matched_keywords.length > 0);
  } else if (activeFilter === "corrigendum") {
    filtered = filtered.filter((t) => t.status === "corrigendum_issued");
  } else if (activeFilter === "urgent") {
    filtered = filtered.filter((t) => {
      const d = daysUntil(t.bid_submission_end);
      return d !== null && d >= 0 && d <= 7;
    });
  } else if (activeFilter === "tracked") {
    filtered = filtered.filter((t) => t.is_tracked);
  } else if (activeFilter === "applied") {
    filtered = filtered.filter((t) => t.is_applied);
  }

  if (filtered.length === 0) {
    resultsEl.innerHTML = `<div class="empty">${ICONS.empty}<div>No tenders match. Try a different search or filter.</div></div>`;
    return;
  }

  resultsEl.innerHTML = filtered.map(renderCard).join("");
}

function renderCard(t) {
  const days = daysUntil(t.bid_submission_end);
  let deadlineClass = "";
  let deadlineText = "No deadline";
  if (days !== null) {
    deadlineClass = days <= 2 ? "urgent" : days <= 7 ? "soon" : "";
    deadlineText = days < 0 ? "Closed" : days === 0 ? "Today" : `${days}d left`;
  }

  const isPrecise = t.matched_keywords && t.matched_keywords.length > 0;
  const isChanged = t.status === "corrigendum_issued";
  const orgName = t.organisations && t.organisations.name;
  const detailUrl = `?tender=${t.id}`;

  return `
    <div class="card ${deadlineClass ? "card-" + deadlineClass : ""}">
      <div class="card-top">
        <div>
          <a class="title-link" href="${detailUrl}" target="_blank"><div class="title">${escapeHtml(t.title)}</div></a>
          ${orgName ? `<div class="org-name">${ICONS.building} ${escapeHtml(orgName)}</div>` : ""}
        </div>
        <div class="deadline-badge ${deadlineClass}">${deadlineText}</div>
      </div>
      <div class="badges">
        <span class="badge portal">${escapeHtml((t.portal_source || "gem").toUpperCase())}</span>
        ${isPrecise ? `<span class="badge precise">Core match</span>` : ""}
        ${isChanged ? `<span class="badge corrigendum">Recently changed</span>` : ""}
        ${(t.matched_keywords || []).map((k) => `<span class="badge">${escapeHtml(k)}</span>`).join("")}
      </div>
      <div class="meta">
        <div class="meta-row">${ICONS.pin} ${t.location ? escapeHtml(t.location) : "State not yet known"}</div>
        <div class="meta-row">${ICONS.coin} ${t.estimated_value ? "\u20b9" + Number(t.estimated_value).toLocaleString("en-IN") : "Value not specified"}</div>
        <div class="tender-id">${escapeHtml(t.tender_number)}</div>
      </div>
      ${t.ai_executive_summary ? `<div class="ai-summary">${escapeHtml(t.ai_executive_summary)}</div>` : ""}
      <div class="card-actions">
        ${t.portal_url ? `<a class="view-btn" href="${t.portal_url}" target="_blank" rel="noopener">Document ${ICONS.arrow}</a>` : ""}
        <button class="toggle-btn ${t.is_tracked ? "active-track" : ""}" onclick="toggleField('${t.id}', 'is_tracked', ${!t.is_tracked})">${t.is_tracked ? "\u2605 Tracking" : "\u2606 Track"}</button>
        <button class="toggle-btn ${t.is_applied ? "active-applied" : ""}" onclick="toggleField('${t.id}', 'is_applied', ${!t.is_applied})">${t.is_applied ? "\u2713 Applied" : "Mark applied"}</button>
        <a class="expand-btn" href="${detailUrl}" target="_blank">Full details \u2197</a>
      </div>
    </div>
  `;
}

function loadSingleTender(tenderId) {
  document.getElementById("listHeader") && (document.getElementById("listHeader").style.display = "none");
  document.getElementById("detailHeader").style.display = "block";
  document.getElementById("listStatusLine").style.display = "none";
  document.title = "TenderPulse";

  fetch(
    `${SUPABASE_CONFIG.url}/rest/v1/tenders?id=eq.${tenderId}&select=*,organisations(name)&limit=1`,
    { headers: { apikey: SUPABASE_CONFIG.anonKey, Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}` } }
  )
    .then((res) => res.json())
    .then((rows) => {
      if (!rows.length) {
        document.getElementById("results").innerHTML = `<div class="error">Tender not found -- it may have been removed.</div>`;
        return;
      }
      allTenders = [rows[0]];
      document.title = rows[0].title.slice(0, 60) + " · TenderPulse";
      document.getElementById("results").innerHTML = `<div class="detail-card">${renderDetailPage(rows[0])}</div>`;
    })
    .catch((err) => {
      document.getElementById("results").innerHTML = `<div class="error">Couldn't load this tender: ${escapeHtml(err.message)}</div>`;
    });
}

function renderDetailPage(t) {
  const days = daysUntil(t.bid_submission_end);
  const deadlineText = days === null ? "No deadline captured" : days < 0 ? "Closed" : days === 0 ? "Closes today" : `${days} day${days === 1 ? "" : "s"} left`;
  const orgName = t.organisations && t.organisations.name;
  const hasAi = t.ai_executive_summary || t.ai_eligibility_summary || t.ai_risk_factors;

  let aiSection;
  if (hasAi) {
    aiSection = `
    ${t.ai_executive_summary ? `<div class="ai-section"><h3>${ICONS.spark} Executive summary</h3><div class="body">${escapeHtml(t.ai_executive_summary)}</div></div>` : ""}
    ${t.ai_eligibility_summary ? `<div class="ai-section"><h3>${ICONS.spark} Eligibility</h3><div class="body">${escapeHtml(t.ai_eligibility_summary)}</div></div>` : ""}
    ${t.ai_risk_factors ? `<div class="ai-section"><h3>${ICONS.spark} Risk factors</h3><div class="body">${escapeHtml(t.ai_risk_factors)}</div></div>` : ""}`;
  } else if (t.analyze_requested) {
    aiSection = `
    <div class="analyze-box" id="analyzeBox">
      <p>Analysis requested \u2014 checked every few minutes in the background, usually ready within 5-10 minutes. Reload this page later to see it.</p>
    </div>`;
  } else {
    aiSection = `
    <div class="analyze-box" id="analyzeBox">
      <p>This tender hasn't been read by AI yet. Request an analysis to get a plain-English summary, eligibility rules, and risk factors -- usually ready within a few minutes.</p>
      <button class="analyze-btn" onclick="analyzeTender('${t.id}')">Analyze this tender</button>
    </div>`;
  }

  return `
    <div class="modal-title">${escapeHtml(t.title)}</div>
    ${orgName ? `<div class="modal-org">${ICONS.building} ${escapeHtml(orgName)}</div>` : ""}
    <div class="modal-meta-grid">
      <div class="modal-meta-item"><div class="label">Deadline</div><div class="value">${deadlineText}</div></div>
      <div class="modal-meta-item"><div class="label">Location</div><div class="value">${t.location ? escapeHtml(t.location) : "Not yet known"}</div></div>
      <div class="modal-meta-item"><div class="label">Value</div><div class="value">${t.estimated_value ? "\u20b9" + Number(t.estimated_value).toLocaleString("en-IN") : "Not specified"}</div></div>
      <div class="modal-meta-item"><div class="label">Tender ID</div><div class="value mono">${escapeHtml(t.tender_number)}</div></div>
    </div>
    ${aiSection}
    <div class="modal-actions">
      ${t.portal_url ? `<a class="view-btn" href="${t.portal_url}" target="_blank" rel="noopener">Document ${ICONS.arrow}</a>` : ""}
      <button class="toggle-btn ${t.is_tracked ? "active-track" : ""}" onclick="toggleField('${t.id}', 'is_tracked', ${!t.is_tracked})">${t.is_tracked ? "\u2605 Tracking" : "\u2606 Track"}</button>
      <button class="toggle-btn ${t.is_applied ? "active-applied" : ""}" onclick="toggleField('${t.id}', 'is_applied', ${!t.is_applied})">${t.is_applied ? "\u2713 Applied" : "Mark applied"}</button>
    </div>
  `;
}

function isDetailMode() {
  return new URLSearchParams(window.location.search).has("tender");
}

async function analyzeTender(tenderId) {
  // Doesn't call Gemini directly -- that would require exposing the API
  // key in this public code, which GitHub's own secret scanner correctly
  // blocked when first attempted. Instead this just sets a flag; a
  // background job on the server (which already safely holds the key)
  // checks for it every few minutes and does the real analysis there.
  const box = document.getElementById("analyzeBox");
  box.innerHTML = `<p>Requesting analysis&hellip;</p>`;

  try {
    const res = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/tenders?id=eq.${tenderId}`, {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_CONFIG.anonKey,
        Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}`,
        "Content-Type": "application/json",
        Prefer: "return=minimal",
      },
      body: JSON.stringify({ analyze_requested: true }),
    });
    if (!res.ok) throw new Error(`Couldn't request analysis (${res.status})`);

    const tender = allTenders.find((t) => t.id === tenderId);
    if (tender) tender.analyze_requested = true;
    document.getElementById("results").innerHTML = `<div class="detail-card">${renderDetailPage(tender)}</div>`;
  } catch (err) {
    box.innerHTML = `<p>Couldn't request analysis.</p>
      <div class="analyze-error">${escapeHtml(err.message)}</div>
      <button class="analyze-btn" onclick="analyzeTender('${tenderId}')" style="margin-top: 10px;">Try again</button>`;
  }
}

async function toggleField(tenderId, field, newValue) {
  try {
    const res = await fetch(
      `${SUPABASE_CONFIG.url}/rest/v1/tenders?id=eq.${tenderId}`,
      {
        method: "PATCH",
        headers: {
          apikey: SUPABASE_CONFIG.anonKey,
          Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal",
        },
        body: JSON.stringify({ [field]: newValue }),
      }
    );
    if (!res.ok) throw new Error(`Update failed: ${res.status}`);
    const tender = allTenders.find((t) => t.id === tenderId);
    if (tender) tender[field] = newValue;
    if (isDetailMode()) {
      document.getElementById("results").innerHTML = `<div class="detail-card">${renderDetailPage(tender)}</div>`;
    } else {
      render();
    }
  } catch (err) {
    alert(`Couldn't save that change: ${err.message}`);
  }
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll(".chip").forEach((chip) => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    render();
  });
});

const requestedTenderId = new URLSearchParams(window.location.search).get("tender");
if (requestedTenderId) {
  loadSingleTender(requestedTenderId);
} else {
  loadTenders();
  setInterval(loadTenders, 5 * 60 * 1000);
}
</script>

</body>
</html>
