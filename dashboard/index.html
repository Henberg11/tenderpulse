<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TenderPulse</title>

<!-- Makes "Add to Home Screen" behave like a real app: own icon, opens
     full-screen without browser chrome, correct splash color. -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TenderPulse">
<meta name="theme-color" content="#0f1115">

<style>
  /* Dark theme by default, automatically switches to light if the phone/
     browser is set to light mode -- no toggle needed, respects the
     person's existing system preference. */
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --card-border: #262b36;
    --text: #e8eaed;
    --text-dim: #9aa1ac;
    --accent: #4f8cff;
    --green: #3ecf8e;
    --orange: #f5a623;
    --red: #ef5350;
    --stat-bg: #171a21;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --card-border: #e3e6eb;
      --text: #1a1d23;
      --text-dim: #6b7280;
      --accent: #2f6fe0;
      --green: #1e9e6b;
      --orange: #c47d0a;
      --red: #d64545;
      --stat-bg: #ffffff;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
    /* Respect iPhone notch/home-indicator area when installed as an app */
    padding-top: env(safe-area-inset-top);
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--card-border);
    z-index: 10;
  }
  h1 { font-size: 20px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* Glance-friendly summary -- the whole point of checking each morning is
     answering "does anything need my attention today", without reading
     every card. This answers that in one line, no scrolling. */
  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .stat {
    background: var(--stat-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 14px;
    flex: 1;
    min-width: 90px;
    text-align: center;
  }
  .stat .num { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .stat .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stat.urgent .num { color: var(--red); }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type="text"] {
    flex: 1;
    min-width: 140px;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 16px; /* 16px prevents iOS Safari from auto-zooming on focus */
  }
  select#stateFilter {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 10px;
    border-radius: 8px;
    font-size: 14px;
    max-width: 130px;
  }
  .chip {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  main { padding: 16px; max-width: 720px; margin: 0 auto; }
  .status-line { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-left: 3px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card.card-urgent { border-left-color: var(--red); }
  .card.card-soon { border-left-color: var(--orange); }
  .card-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; }
  .title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; }
  .org-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 4px;
  }
  .deadline-badge {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(128, 128, 128, 0.15);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .deadline-badge.urgent { background: rgba(239, 83, 80, 0.15); color: var(--red); }
  .deadline-badge.soon { background: rgba(245, 166, 35, 0.15); color: var(--orange); }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(128, 128, 128, 0.15);
    color: var(--text-dim);
  }
  .badge.precise { background: rgba(62, 207, 142, 0.15); color: var(--green); }
  .badge.corrigendum { background: rgba(245, 166, 35, 0.15); color: var(--orange); }
  .badge.portal { background: rgba(79, 140, 255, 0.15); color: var(--accent); font-weight: 700; }
  .meta { font-size: 13px; color: var(--text-dim); margin-top: 10px; line-height: 1.7; }
  .meta a { color: var(--accent); text-decoration: none; }
  .ai-summary {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(128, 128, 128, 0.08);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .card-actions { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .view-btn {
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    display: inline-block;
  }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    padding: 10px 0 0;
    cursor: pointer;
  }
  .details { display: none; margin-top: 10px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .details.open { display: block; }
  .details h4 { margin: 10px 0 4px; color: var(--text); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .empty, .loading, .error { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 14px; }
  .error { color: var(--red); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span> TenderPulse</h1>
  <div class="stats" id="statsBar"></div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search titles...">
    <select id="stateFilter">
      <option value="">All States</option>
    </select>
    <span class="chip active" data-filter="all">All</span>
    <span class="chip" data-filter="precise">My Products</span>
    <span class="chip" data-filter="urgent">Closing Soon</span>
    <span class="chip" data-filter="corrigendum">Changed</span>
  </div>
</header>

<main>
  <div class="status-line">
    <span id="statusText">Loading...</span>
    <button class="refresh-btn" onclick="loadTenders()">Refresh</button>
  </div>
  <div id="results"></div>
</main>

<script src="config.js"></script>
<script>
let allTenders = [];
let activeFilter = "all";

async function loadTenders() {
  const resultsEl = document.getElementById("results");
  const statusEl = document.getElementById("statusText");

  if (SUPABASE_CONFIG.url.includes("YOUR_PROJECT_REF")) {
    resultsEl.innerHTML = `<div class="error">config.js hasn't been filled in yet -- add your Supabase URL and anon key.</div>`;
    statusEl.textContent = "";
    return;
  }

  statusEl.textContent = "Refreshing...";

  try {
    const res = await fetch(
      `${SUPABASE_CONFIG.url}/rest/v1/tenders?select=*,organisations(name)&order=bid_submission_end.asc.nullslast&limit=200`,
      {
        headers: {
          apikey: SUPABASE_CONFIG.anonKey,
          Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}`,
        },
      }
    );
    if (!res.ok) throw new Error(`Supabase returned ${res.status}: ${await res.text()}`);
    allTenders = await res.json();
    statusEl.textContent = `${allTenders.length} tenders \u00b7 updated ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
    populateStateFilter();
    renderStats();
    render();
  } catch (err) {
    if (allTenders.length === 0) {
      resultsEl.innerHTML = `<div class="error">Couldn't load tenders: ${err.message}</div>`;
    }
    statusEl.textContent = "Refresh failed -- showing last loaded data";
  }
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function renderStats() {
  const statsBar = document.getElementById("statsBar");
  const closingSoon = allTenders.filter((t) => {
    const d = daysUntil(t.bid_submission_end);
    return d !== null && d >= 0 && d <= 7;
  }).length;
  const coreMatches = allTenders.filter((t) => t.matched_keywords && t.matched_keywords.length > 0).length;
  const changed = allTenders.filter((t) => t.status === "corrigendum_issued").length;

  statsBar.innerHTML = `
    <div class="stat ${closingSoon > 0 ? "urgent" : ""}">
      <div class="num">${closingSoon}</div>
      <div class="label">Closing \u22647 days</div>
    </div>
    <div class="stat">
      <div class="num">${coreMatches}</div>
      <div class="label">My Products</div>
    </div>
    <div class="stat">
      <div class="num">${changed}</div>
      <div class="label">Recently Changed</div>
    </div>
    <div class="stat">
      <div class="num">${allTenders.length}</div>
      <div class="label">Total Tracked</div>
    </div>
  `;
}

function populateStateFilter() {
  const select = document.getElementById("stateFilter");
  const currentValue = select.value;
  const states = [...new Set(allTenders.map((t) => t.location).filter(Boolean))].sort();

  select.innerHTML = `<option value="">All States</option>` +
    states.map((s) => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
  select.value = currentValue; // preserve selection across refreshes
}

function render() {
  const resultsEl = document.getElementById("results");
  const query = document.getElementById("search").value.toLowerCase();
  const stateFilter = document.getElementById("stateFilter").value;

  let filtered = allTenders.filter((t) => t.title.toLowerCase().includes(query));

  if (stateFilter) {
    filtered = filtered.filter((t) => t.location === stateFilter);
  }

  if (activeFilter === "precise") {
    filtered = filtered.filter((t) => t.matched_keywords && t.matched_keywords.length > 0);
  } else if (activeFilter === "corrigendum") {
    filtered = filtered.filter((t) => t.status === "corrigendum_issued");
  } else if (activeFilter === "urgent") {
    filtered = filtered.filter((t) => {
      const d = daysUntil(t.bid_submission_end);
      return d !== null && d >= 0 && d <= 7;
    });
  }

  if (filtered.length === 0) {
    resultsEl.innerHTML = `<div class="empty"><div class="empty-icon">\u{1F4ED}</div>No tenders match. Try a different search or filter.</div>`;
    return;
  }

  resultsEl.innerHTML = filtered.map(renderCard).join("");
}

function renderCard(t) {
  const days = daysUntil(t.bid_submission_end);
  let deadlineClass = "";
  let deadlineText = "No deadline yet";
  if (days !== null) {
    deadlineClass = days <= 2 ? "urgent" : days <= 7 ? "soon" : "";
    deadlineText = days < 0 ? "Closed" : days === 0 ? "Today" : `${days}d left`;
  }

  const isPrecise = t.matched_keywords && t.matched_keywords.length > 0;
  const isChanged = t.status === "corrigendum_issued";
  const orgName = t.organisations && t.organisations.name;

  const hasDetails = t.ai_eligibility_summary || t.ai_risk_factors;
  const cardId = `details-${t.id}`;

  return `
    <div class="card ${deadlineClass ? "card-" + deadlineClass : ""}">
      <div class="card-top">
        <div>
          <div class="title">${escapeHtml(t.title)}</div>
          ${orgName ? `<div class="org-name">\u{1F3E2} ${escapeHtml(orgName)}</div>` : ""}
        </div>
        <div class="deadline-badge ${deadlineClass}">${deadlineText}</div>
      </div>
      <div class="badges">
        <span class="badge portal">${escapeHtml((t.portal_source || "gem").toUpperCase())}</span>
        ${isPrecise ? `<span class="badge precise">Core Match</span>` : ""}
        ${isChanged ? `<span class="badge corrigendum">Recently Changed</span>` : ""}
        ${(t.matched_keywords || []).map((k) => `<span class="badge">${escapeHtml(k)}</span>`).join("")}
      </div>
      <div class="meta">
        ${t.location ? `<div>\u{1F4CD} ${escapeHtml(t.location)}</div>` : ""}
        <div>\u{1F4B0} ${t.estimated_value ? "\u20b9" + Number(t.estimated_value).toLocaleString("en-IN") : "Value not specified"}</div>
        <div>${escapeHtml(t.tender_number)}</div>
      </div>
      ${t.ai_executive_summary ? `<div class="ai-summary">${escapeHtml(t.ai_executive_summary)}</div>` : ""}
      <div class="card-actions">
        ${t.portal_url ? `<a class="view-btn" href="${t.portal_url}" target="_blank" rel="noopener">View Document \u2192</a>` : ""}
        ${hasDetails ? `<button class="expand-btn" onclick="toggleDetails('${cardId}')">Eligibility &amp; risk \u2193</button>` : ""}
      </div>
      ${hasDetails ? `
        <div class="details" id="${cardId}">
          ${t.ai_eligibility_summary ? `<h4>Eligibility</h4><div>${escapeHtml(t.ai_eligibility_summary)}</div>` : ""}
          ${t.ai_risk_factors ? `<h4>Risk Factors</h4><div>${escapeHtml(t.ai_risk_factors)}</div>` : ""}
        </div>
      ` : ""}
    </div>
  `;
}

function toggleDetails(id) {
  document.getElementById(id).classList.toggle("open");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("stateFilter").addEventListener("change", render);
document.querySelectorAll(".chip").forEach((chip) => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    render();
  });
});

loadTenders();
// Refresh automatically every 5 minutes if left open on a phone.
setInterval(loadTenders, 5 * 60 * 1000);
</script>

</body>
</html>
